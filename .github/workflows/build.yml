name: Build ROM

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc git build-essential libpng-dev

      - name: Install RGBDS Compiler
        uses: gbdev/setup-rgbds@v1
        with:
          version: 'v0.7.0'

      - name: Pre-build Repository Tools
        run: |
          make -C tools/

      - name: Build Pokémon Yellow ROM
        run: |
          make
          
      - name: Upload Finished GBC ROM
        uses: actions/upload-artifact@v4
        with:
          name: pokeyellow-rom
          path: |
            *.gbc
            *.sym
        run: |
          make -C tools/

      - name: Build Pokémon Yellow ROM
        run: |
          make
          
      - name: Upload Finished GBC ROM
        uses: actions/upload-artifact@v4
        with:
          name: pokeyellow-rom
          path: |
            *.gbc
            *.sym
      - name: Upload Finished GBC ROM
        uses: actions/upload-artifact@v4
        with:
          name: pokeyellow-rom
          path: |
            pokeyellow.gbc
            pokeyellow.sym
